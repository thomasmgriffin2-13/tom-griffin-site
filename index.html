<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tom Griffin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff;
      color: #111;
      font-size: 16px;
      line-height: 1.6;
    }

    nav {
      display: flex;
      gap: 1.5rem;
      padding: 1.25rem 2rem;
      border-bottom: 1px solid #eee;
    }

    nav a {
      text-decoration: none;
      color: #111;
      font-size: 0.95rem;
    }

    nav a:hover { text-decoration: underline; }

    main {
      max-width: 640px;
      margin: 3rem auto;
      padding: 0 1.5rem;
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }

    .profile img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      background: #ddd;
    }

    .profile-placeholder {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #ddd;
      flex-shrink: 0;
    }

    .profile h1 {
      font-size: 1.4rem;
      font-weight: 600;
    }

    .profile p {
      color: #555;
      font-size: 0.95rem;
      margin-top: 0.2rem;
    }

    section { margin-bottom: 2.5rem; }

    section h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #999;
    }

    section p {
      color: #333;
      font-size: 0.97rem;
    }
  </style>
</head>
<body>

  <nav>
    <a href="#">Home</a>
    <a href="#">Blog</a>
    <a href="#">LinkedIn</a>
    <a href="#">Twitter</a>
  </nav>

  <main>
    <div class="profile">
      <img src="website-headshot.png" alt="Tom Griffin" />
      <div>
        <h1>Tom Griffin</h1>
        <p>Your one-line bio goes here.</p>
      </div>
    </div>

    <section>
      <h2>What I'm Up To</h2>
      <p>A short description of what you're currently working on or focused on.</p>
    </section>

    <section>
      <h2>Background</h2>
      <p>A few sentences about who you are, where you've been, and what you care about.</p>
    </section>
  </main>

</body>
</html>
